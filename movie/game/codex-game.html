<!DOCTYPE html>
<html lang="en">
<head><script src="/.nekoweb-api/static/site.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive Maze | Final Logic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vampiro+One&family=Klee+One:wght@400;600&display=swap');

        :root {
            --bg: #0d0415;
            --gold: #d4af37;
            --miki: #ccff00;
            --star: #afe1af;
            --milo: #d2b48c;
            --tile: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Klee One', cursive;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            background: #000;
            padding: 15px 40px;
            display: flex; justify-content: space-between;
            border-bottom: 2px solid var(--gold);
            font-family: 'Vampiro One', system-ui;
            color: var(--gold);
            font-size: 1.4rem;
        }

        .dashboard {
            display: flex; flex: 1; padding: 20px; gap: 40px;
            align-items: center; justify-content: center;
        }

        #game-board {
            display: grid; grid-template-columns: repeat(5, 80px);
            gap: 10px; padding: 15px; background: rgba(0,0,0,0.4);
            border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .tile {
            width: 80px; height: 80px; background: var(--tile);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: rgba(255,255,255,0.2);
            border-radius: 8px; transition: all 0.4s ease;
        }

        .tile.active { 
            background: var(--gold); color: #000; 
            box-shadow: 0 0 25px var(--gold); font-weight: 600; 
        }

        .tile.visited { border-color: rgba(255, 255, 255, 0.4); }
        .tile.sibling { border-width: 2px; }

        .controls-container { flex: 1; max-width: 450px; display: flex; flex-direction: column; gap: 10px; }

        #message-box {
            background: rgba(20, 10, 30, 0.95); border: 1px solid var(--gold);
            padding: 25px; border-radius: 12px; min-height: 320px; 
            display: flex; flex-direction: column; justify-content: center;
        }

        .game-btn {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 12px; cursor: pointer;
            font-family: 'Klee One'; font-weight: 600; transition: 0.3s;
            border-radius: 5px; margin: 4px;
        }
        
        .game-btn:hover { background: var(--gold); color: #000; }
        .miki-btn { border-color: var(--miki); color: var(--miki); }
        .star-btn { border-color: var(--star); color: var(--star); }
        .milo-btn { border-color: var(--milo); color: var(--milo); }

        input { 
            background: #000; border: 1px solid var(--miki); color: var(--miki); 
            padding: 10px; width: 80%; align-self: center; margin-top: 15px; 
            font-family: 'Klee One'; text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <span>ARCHIVE NEXUS</span>
        <span id="player-title" style="font-size: 0.9rem;">INITIATE</span>
    </header>

    <div class="dashboard">
        <div id="game-board"></div>

        <div class="controls-container">
            <button class="game-btn" onclick="resetGame()">REBOOT SYSTEM</button>
            <div id="message-box">
                <p id="game-text">System initializing...</p>
                <div id="game-btns"></div>
            </div>
        </div>
    </div>

    <script>
        let currentSq = 1;
        let mentor = "None";
        let mikiSolved = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(f, type, d, v) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        const sounds = {
            ping: () => playTone(349.23, 'triangle', 0.4, 0.08),
            win: () => { playTone(523.25, 'sine', 0.4, 0.1); setTimeout(() => playTone(659.25, 'sine', 0.4, 0.1), 100); }
        };

        const archiveMessages = {
            1: "HANS: 'The first step is always the most formal. Does one lift the pinkie when drinking Earl Grey?'",
            2: "HANS: 'Elegance begins with the spine. Stand tall, even in digital spaces.'",
            3: "QUOTE: 'To thine own self be true, and it must follow, as the night the day...' — Shakespeare",
            4: "DECODER: 'Scanning sector... Found a hidden memo from Hans about proper tie knots.'",
            5: "HANS: 'Punctuality is a silent form of respect.'",
            6: "MIKI: 'Pssst. If you find a data-leak, don't tell Hans. He'll try to iron it.'",
            7: "QUOTE: 'The course of true love never did run smooth.' — Shakespeare",
            8: "MIKI: 'Code is just poetry that actually does something.'",
            9: "DECODER: [PING] Crossroads detected. Sibling energy levels high.",
            10: "CROSSROADS: Hans, Miki, Star, and Milo await. Who will you learn from?",
            11: "MIKI: 'Data packets are humming. Someone is watching Square 13.'",
            12: "QUOTE: 'Brevity is the soul of wit.' — Shakespeare",
            13: "STAR: 'The coffee is brewing and the constellations are aligning. Care to visit?'",
            14: "STAR: 'Sometimes the best data is found in the spaces between stars.'",
            15: "HANS: 'True refinement is knowing when to speak and when to listen.'",
            16: "RIDDLE: MIKI: 'Emergency! This node is frozen. To thaw it, tell me: What is the one thing Hans refuses to let his tea become?'",
            17: "MIKI: 'Brilliant! You've stabilized the node. Hans's obsession with temperature finally paid off.'",
            18: "MILO: 'The roots of the Archive are ancient. Do you feel the soil breathing?'",
            19: "QUOTE: 'All the world's a stage, and all the men and women merely players.' — Shakespeare",
            20: "MILO: 'Growth takes time. Even the fastest code was once a slow thought.'",
            21: "DECODER: 'Harmonizing Sibling frequencies... The Archive is nearly whole.'",
            22: "HANS: 'A mistake is simply an opportunity for a more graceful recovery.'",
            23: "MIKI: 'The Core is opening. It looks... peaceful.'",
            24: "QUOTE: 'Our remedies oft in ourselves do lie.' — Shakespeare",
            25: "THE CORE: The data is reconciled. Will you Redeem the past or Delete it?"
        };

        function createBoard() {
            const board = document.getElementById('game-board'); board.innerHTML = "";
            for(let i=1; i<=25; i++) {
                const div = document.createElement('div');
                div.className = 'tile'; div.id = `sq-${i}`; div.innerText = i;
                if(i===13) div.style.borderColor = 'var(--star)';
                if(i===16) div.style.borderColor = 'var(--miki)';
                if(i===18) div.style.borderColor = 'var(--milo)';
                board.appendChild(div);
            }
        }

        function resetGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentSq = 1; mentor = "None"; mikiSolved = false;
            document.getElementById('player-title').innerText = "INITIATE";
            createBoard(); updateUI();
        }

        function move(n) {
            document.getElementById(`sq-${currentSq}`).classList.add('visited');
            currentSq = Math.max(1, Math.min(25, currentSq + n));
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
            document.getElementById(`sq-${currentSq}`).classList.add('active');
            const text = document.getElementById('game-text');
            const btns = document.getElementById('game-btns');

            if (currentSq === 1) {
                text.innerText = archiveMessages[1];
                btns.innerHTML = `<button class="game-btn" onclick="alert('Hans: Good heavens, no.')">YES</button><button class="game-btn" onclick="sounds.win(); move(1)">NO</button>`;
            } 
            else if (currentSq === 10 && mentor === "None") {
                sounds.ping();
                text.innerText = archiveMessages[10];
                btns.innerHTML = `
                    <button class="game-btn" onclick="setMentor('Hans')">HANS</button>
                    <button class="game-btn miki-btn" onclick="setMentor('Miki')">MIKI</button>
                    <button class="game-btn star-btn" onclick="setMentor('Star')">STAR</button>
                    <button class="game-btn milo-btn" onclick="setMentor('Milo')">MILO</button>
                `;
            }
            else if (currentSq === 13) {
                text.innerText = archiveMessages[13];
                btns.innerHTML = `<button class="game-btn star-btn" onclick="window.open('https://star-link.com')">STAR'S CAFE</button><button class="game-btn" onclick="move(1)">FORWARD</button>`;
            }
            else if (currentSq === 16 && !mikiSolved) {
                text.innerText = archiveMessages[16];
                btns.innerHTML = `<input type="text" id="ans" placeholder="The word is..."><button class="game-btn miki-btn" onclick="checkMiki()">DECRYPT</button>`;
            }
            else if (currentSq === 18) {
                text.innerText = archiveMessages[18];
                btns.innerHTML = `<button class="game-btn milo-btn" onclick="window.open('https://milo-link.com')">MILO'S GARDEN</button><button class="game-btn" onclick="move(1)">FORWARD</button>`;
            }
            else if (currentSq === 25) {
                text.innerText = archiveMessages[25];
                btns.innerHTML = `<button class="game-btn" style="color:#ff4500" onclick="end('Redeem')">REDEEM</button><button class="game-btn" onclick="end('Delete')">DELETE</button>`;
            }
            else {
                text.innerText = archiveMessages[currentSq] || `Square ${currentSq}: The data flow is steady.`;
                btns.innerHTML = `<button class="game-btn" onclick="move(1)">FORWARD</button><button class="game-btn" onclick="move(-1)">BACK</button>`;
            }
        }

        function setMentor(m) { mentor = m; sounds.win(); move(1); }

        function checkMiki() {
            if(document.getElementById('ans').value.toLowerCase() === 'cold') {
                mikiSolved = true; sounds.win(); move(1);
            } else { alert("MIKI: 'Wrong! Think about what happens to tea if you forget to drink it!'"); }
        }

        function end(choice) {
            if(choice === 'Redeem') {
                document.getElementById('player-title').innerText = "ARCHIVIST OF THE INFINITE";
                document.getElementById('game-text').innerText = "You have integrated the siblings' paths. The Archive is whole and the code is redeemed.";
            } else {
                document.getElementById('game-text').innerText = "The past has been scrubbed. The Archive is a blank slate.";
            }
            document.getElementById('game-btns').innerHTML = `<button class="game-btn" onclick="resetGame()">RESTART JOURNEY</button>`;
        }

        createBoard();
    </script>
</body>
</html>
