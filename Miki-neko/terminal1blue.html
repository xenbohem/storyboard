<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miki's Core Log | Chimera Collective</title>
    <style>
        :root {
            --accent: #00d4ff; 
            --bg: #050505;
            --panel: #111;
            --text: #e0f7fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            background-color: var(--bg); 
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 450px; 
            height: 100vh;
        }

        /* --- LEFT SIDE --- */
        .experience-side {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-right: 1px solid var(--accent);
        }

    .banner-frame {
        width: 100%;
        height: 180px;
        overflow: hidden;
        position: relative;
        border-bottom: 2px solid var(--accent);
        background: #000;
    }

    /* The default blue-tinted image */
    .base-layer {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: hue-rotate(180deg) brightness(0.8) contrast(1.2);
        position: absolute;
        top: 0;
        left: 0;
    }

    /* The "Hover Spot" logic */
    .reveal-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('chimeracafe-banner-cool.jpg');
        background-size: cover;
        background-position: center;
        /* This hides the "true color" layer by default using a tiny 0% circle */
        clip-path: circle(0% at 50% 50%);
        transition: clip-path 0.4s ease-out;
        pointer-events: none; /* Let the mouse "see through" to the frame */
    }

    /* When the user hovers over the banner, the circle expands over her face */
    /* Adjust the '55% 40%' below to match exactly where her face is in your image */
    .banner-frame:hover .reveal-layer {
        clip-path: circle(120px at 55% 40%); 
        filter: brightness(1.1); /* Make her face pop a little more */
    }

        .banner-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Applying a 'cyber' filter to the cafe banner for Miki's side */
            filter: hue-rotate(180deg) brightness(0.8); 
        }

        .media-viewport {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%);
        }

        /* --- THE GLOWING WEB (Instructions) --- */
        .web-container {
            position: relative;
            margin-bottom: 10px;
            cursor: help;
        }

        .spiderweb-icon {
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            animation: webPulse 2s infinite alternate;
        }

        .web-tooltip {
            visibility: hidden;
            width: 280px;
            background-color: rgba(0, 0, 0, 0.9);
            color: var(--accent);
            text-align: center;
            border: 1px solid var(--accent);
            padding: 10px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .web-container:hover .web-tooltip { visibility: visible; }

        @keyframes webPulse {
            from { opacity: 0.5; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1.05); }
        }

        /* --- SEARCH AREA --- */
        .log-section {
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }

        .search-area { display: flex; gap: 10px; margin: 20px 0; }
        
        #coreSearch {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            outline: none;
            box-shadow: inset 0 0 5px var(--accent);
        }

        .access-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .log-entry {
            background: #0a0a0a;
            padding: 25px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            min-height: 120px;
            line-height: 1.6;
        }

        /* --- RIGHT SIDE: PADLET --- */
        .padlet-sidebar {
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--accent);
        }

        iframe { width: 100%; height: 100%; border: none; }

    </style>
</head>
<body>

    <div class="main-grid">
        
        <div class="experience-side">
           <div class="banner-frame">
    <img src="https://xencafe.nekoweb.org/2026-LIVESTREAM/MIKIS-REALM-ARTPOST/MikiPeeringManically.jpeg" class="banner-image base-layer" alt="Core Log Banner">
    
    <div class="reveal-layer"></div>
</div>

            <div class="media-viewport">
                
                <div class="web-container">
                    <div class="spiderweb-icon">🕸</div>
                    <div class="web-tooltip">
                        SYSTEM DECRYPTOR: <br>
                        Type a name (Hans, Star, Chari) or a keyword (Tea, Core) into the terminal to extract the hidden logs.
                    </div>
                </div>

                <div class="log-section">
                    <div class="log-header">
                        <h2 style="color: var(--accent); letter-spacing: 2px;">> CORE_LOG_DECRYPTOR</h2>
                    </div>

                    <div class="search-area">
                        <input type="text" id="coreSearch" placeholder="Command line input required...">
                        <button class="access-btn" onclick="queryMiki()">DECRYPT</button>
                    </div>

                    <div id="logResult" class="log-entry">
                        [SYSTEM IDLE... HOVER OVER THE WEB FOR GUIDANCE]
                    </div>
                </div>
            </div>
        </div>

        <div class="padlet-sidebar">
            <iframe src="https://padlet.com/embed/hbu3ozs9k8tqlhuy"></iframe>
        </div>

    </div>

    <script>
        const mikiLore = [
            { key: "hans", msg: "[ENTRY 04]: I attempted to upgrade Hans's ledger to a digital tablet. He threatened to ban me from the Earl Grey supply. The man is a luddite, but his tea is efficient." },
            { key: "star", msg: "[ENTRY 07]: Star's romance novels are actually encoded with strange coordinates. I'm not sure if she knows she's reading navigation charts, or if she's just that deep into the plot." },
            { key: "chari", msg: "[ENTRY 09]: Chari asked if 'hacking' was like making a perfect latte. I told her yes—one wrong move and everything overflows. She seems to understand now." },
            { key: "tea", msg: "[ENTRY 01]: Temperature stabilized at 205°F. Hans approves. For now." }
        ];

        function queryMiki() {
            const val = document.getElementById('coreSearch').value.toLowerCase();
            const res = document.getElementById('logResult');
            
            const match = mikiLore.find(e => val.includes(e.key));
            
            if(match) {
                res.innerHTML = `<span style="color:var(--accent)">[LOG RECOVERED]:</span><br><br>${match.msg}`;
            } else {
                res.innerHTML = `<span style="color:#ff4444">[ACCESS DENIED]:</span> No record found for '${val}'. Reference the spiderweb if lost.`;
            }
        }
    </script>

</body>
</html>
