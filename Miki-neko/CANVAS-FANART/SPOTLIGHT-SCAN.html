<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miki's Core Log | Chimera Collective</title>
    <style>
        :root {
            --accent: #00d4ff; 
            --bg: #050505;
            --text: #e0f7fa;
            --panel: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body, html { 
            background-color: var(--bg); 
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- THE TERMINAL SECTION --- */
        .terminal-view {
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid var(--accent);
        }

        /* --- THE FIXED BIOSCAN BANNER --- */
        .banner-frame {
            width: 100%;
            height: 300px; /* Adjusted for better visibility */
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 1px solid var(--accent);
            cursor: none; /* Mouse disappears to become the scanner */
        }

        /* Layer 1: The Blue Base */
        .base-layer {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: hue-rotate(180deg) brightness(0.5) saturate(1.2);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Layer 2: The Moveable Reveal */
        .reveal-layer {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background-image: url('https://xenbohem.github.io/storyboard/Miki-neko/CANVAS-FANART/MikiPeeringManically.jpeg');
            background-size: cover;
            background-position: center;
            opacity: 0;
            z-index: 2; /* Forces it over the blue layer */
            transition: opacity 0.3s ease;
            /* Uses CSS Variables for the mouse tracking */
            clip-path: circle(120px at var(--x, 50%) var(--y, 50%));
            pointer-events: none;
        }

        .banner-frame:hover .reveal-layer {
            opacity: 1;
        }

        /* --- INTERFACE CONTENT --- */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .web-container {
            position: relative;
            margin-bottom: 15px;
            cursor: help;
        }

        .spiderweb-icon {
            font-size: 2.5rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            animation: webPulse 2s infinite alternate;
        }

        .web-tooltip {
            visibility: hidden;
            width: 280px;
            background-color: rgba(0, 0, 0, 0.95);
            color: var(--accent);
            text-align: center;
            border: 1px solid var(--accent);
            padding: 15px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
        }

        .web-container:hover .web-tooltip { visibility: visible; }

        @keyframes webPulse {
            from { opacity: 0.4; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            text-align: center;
        }

        #coreSearch {
            width: 70%;
            background: #000;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            outline: none;
            font-family: inherit;
        }

        .access-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        .log-entry {
            margin-top: 20px;
            padding: 20px;
            background: var(--panel);
            border: 1px solid rgba(0, 212, 255, 0.2);
            min-height: 120px;
            text-align: left;
        }

        .canvas-trigger {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .canvas-trigger:hover {
            background: var(--accent);
            color: black;
        }

        /* --- CANVAS SECTION --- */
        .canvas-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #111;
        }

        .canvas-header {
            padding: 15px;
            background: #000;
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: space-between;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="terminal-view" id="top">
        <div class="banner-frame" id="scannerFrame">
            <img src="chimeracafe-banner-cool.jpg" class="base-layer">
            <div class="reveal-layer" id="scannerSpot"></div>
        </div>

        <div class="content-area">
            <div class="web-container">
                <div class="spiderweb-icon">🕸</div>
                <div class="web-tooltip">
                    <strong>// BIOSCAN ACTIVE</strong><br><br>
                    Move your cursor over the banner to reveal Miki's true frequency. Use the terminal below to query the Chimera's history.
                </div>
            </div>

            <div class="search-container">
                <h2 style="color:var(--accent); margin-bottom: 10px;">> CORE_DECRYPTOR_V1.2</h2>
                <input type="text" id="coreSearch" placeholder="Awaiting bypass code..." onkeydown="if(event.key==='Enter') queryMiki()">
                <button class="access-btn" onclick="queryMiki()">DECRYPT</button>
                <div id="logResult" class="log-entry">[SYSTEM STANDBY]</div>
            </div>

            <a href="#canvas" class="canvas-trigger">OPEN WIDE-VIEW CANVAS</a>
        </div>
    </div>

    <div class="canvas-section" id="canvas">
        <div class="canvas-header">
            <span style="color: var(--accent)">// LIVE CANVAS FEED</span>
            <a href="#top" style="color: var(--accent); text-decoration: none;">↑ TOP</a>
        </div>
        <iframe src="https://padlet.com/embed/hbu3ozs9k8tqlhuy"></iframe>
    </div>

    <script>
        // --- BIOSCAN LOGIC ---
        const frame = document.getElementById('scannerFrame');
        const spot = document.getElementById('scannerSpot');

        frame.addEventListener('mousemove', (e) => {
            const rect = frame.getBoundingClientRect();
            // Calculate mouse position as a percentage of the frame width/height
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            // Apply to CSS variables
            spot.style.setProperty('--x', x + '%');
            spot.style.setProperty('--y', y + '%');
        });

        // --- LORE DATABASE ---
        const mikiLore = [
            { key: "hans", msg: "[CORE LOG]: Hans is currently reorganizing the physical ledgers. He has requested I stop 'poking around' the server heat-sync to warm my tea." },
            { key: "star", msg: "[CORE LOG]: Star's romance novels are appearing in the canvas logs. I've attempted to filter them, but the lore depth is... significant." },
            { key: "chari", msg: "[CORE LOG]: Chari keeps leaving sticky notes on the server rack. 'Do not touch - making cold brew.' I'm going to need a bigger firewall." },
            { key: "chimera", msg: "[LORE]: The Chimera is a convergence point. The cafe's foundation was laid on a ley line. Hans thinks it's just 'good soil,' but the data suggests otherwise." },
            { key: "secret", msg: "[ENCRYPTED]: You found the manual override. Tell no one. The tea is a distraction; the cards are the key." }
        ];

        function queryMiki() {
            const val = document.getElementById('coreSearch').value.toLowerCase();
            const res = document.getElementById('logResult');
            const match = mikiLore.find(e => val.includes(e.key));
            
            if(match) {
                res.innerHTML = `<span style="color:var(--accent)">[MATCH]:</span><br><br>${match.msg}`;
            } else {
                res.innerHTML = `<span style="color:#ff4444">[ERROR]:</span> Access denied for query '${val}'. Refer to the web for valid bypass strings.`;
            }
        }
    </script>
</body>
</html>
