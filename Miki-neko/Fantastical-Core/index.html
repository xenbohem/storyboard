<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miki's Core Log | Chimera Collective</title>
    <style>
        :root {
            --accent: #00d4ff; 
            --bg: #050505;
            --text: #e0f7fa;
            --panel: #0a0a0a;
            --magic: #bd00ff; /* A splash of purple for the 'fantastical' button */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body, html { 
            background-color: var(--bg); 
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        /* --- THE BIOSCAN BANNER (FIXED LAYERING) --- */
        .banner-frame {
            width: 100%;
            height: 300px;
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid var(--accent);
            cursor: none; 
        }

        /* Layer 1: The Blue Base */
        .base-layer {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: hue-rotate(180deg) brightness(0.4) saturate(1.2);
            position: absolute;
            top: 0; left: 0; 
            z-index: 10; /* Base layer */
        }

        /* Layer 2: The Watermark */
        .watermark {
            position: absolute;
            bottom: 15px; right: 20px;
            z-index: 15; /* Above base, below spotlight */
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 3px;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Layer 3: The Spotlight (MUST BE HIGHEST Z-INDEX) */
        .reveal-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('chimeracafe-banner-cool.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0; 
            z-index: 20; /* TOP LAYER */
            transition: opacity 0.3s ease;
            clip-path: circle(120px at var(--x, 50%) var(--y, 50%));
            pointer-events: none;
        }

        .banner-frame:hover .reveal-layer { opacity: 1; }

        /* --- FANTASTICAL LORE BUTTON --- */
        .lore-nav-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            background: linear-gradient(180deg, rgba(0,212,255,0.1) 0%, transparent 100%);
        }

        .fantastical-btn {
            position: relative;
            padding: 12px 35px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent);
            overflow: hidden;
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            text-transform: uppercase;
        }

        .fantastical-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(189, 0, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .fantastical-btn:hover {
            box-shadow: 0 0 30px var(--accent), inset 0 0 10px var(--magic);
            border-color: var(--magic);
            transform: translateY(-3px);
        }

        .fantastical-btn:hover::before { left: 100%; }

        /* --- INTERFACE --- */
        .content-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .search-container { width: 100%; max-width: 700px; text-align: center; margin-top: 20px; }
        #coreSearch { width: 70%; background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 12px; outline: none; }
        .access-btn { background: var(--accent); color: black; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; }
        .log-entry { margin-top: 20px; padding: 25px; background: var(--panel); border: 1px solid rgba(0, 212, 255, 0.2); min-height: 150px; text-align: left; }

        .disclaimer { padding: 40px; text-align: center; font-size: 0.7rem; color: #444; }

    </style>
</head>
<body>

    <div class="banner-frame" id="scannerFrame">
        <img src="chimeracafe-banner-cool.jpg" class="base-layer">
        <div class="watermark">MIKI-NEKO // CORE_ID</div>
        <div class="reveal-layer" id="scannerSpot"></div>
    </div>

    <div class="lore-nav-container">
        <a href="miki-lore.html" class="fantastical-btn">✦ Access Personal Lore ✦</a>
    </div>

    <div class="content-area">
        <div class="search-container">
            <h2 id="termHeader" style="color:var(--accent); margin-bottom: 15px;">> CORE_SECURE_OS_v2.0</h2>
            <input type="text" id="coreSearch" placeholder="Awaiting bypass string..." onkeydown="if(event.key==='Enter') queryMiki()">
            <button class="access-btn" onclick="queryMiki()">DECRYPT</button>
            <div id="logResult" class="log-entry">[SYSTEM STANDBY]</div>
        </div>
        
        <br>
        <a href="#canvas" style="color:var(--accent); text-decoration:none; border-bottom:1px dotted;">> SCROLL TO CANVAS FEED</a>
    </div>

    <div id="canvas" style="height:100vh; margin-top: 50px;">
        <iframe src="https://padlet.com/embed/hbu3ozs9k8tqlhuy" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <div class="disclaimer">
        // NOTICE: The Chimera Collective and the character "Miki" are works of fiction. All data logs are for roleplay and world-building purposes only.
    </div>

    <script>
        // Bioscan Logic
        const frame = document.getElementById('scannerFrame');
        const spot = document.getElementById('scannerSpot');
        
        frame.addEventListener('mousemove', (e) => {
            const rect = frame.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            spot.style.setProperty('--x', x + '%');
            spot.style.setProperty('--y', y + '%');
        });

        // Lore Query Logic
        const mikiLore = [
            { key: "hans", v11: "Hans threatened to ban me from the Earl Grey supply.", v12: "Currently observing Hans. JARring frequency detected." },
            { key: "founder", v11: "Founder's signature detected. Deep violet ink.", v12: "The signature has shifted to gold. I cannot translate it yet." }
        ];

        function queryMiki() {
            const val = document.getElementById('coreSearch').value.toLowerCase();
            const res = document.getElementById('logResult');
            const match = mikiLore.find(e => val.includes(e.key));
            
            if(match) {
                res.innerHTML = `<b>[V1.1]:</b> "${match.v11}"<br><br><b>[V1.2]:</b> "${match.v12}"`;
            } else {
                res.innerHTML = `[DATA ERROR]: No matching archive for '${val}'.`;
            }
        }
    </script>
</body>
</html>
