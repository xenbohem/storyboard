<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hans // The Scribe of Centuries</title>
    <style>
        :root {
            --parchment: #f4ecd8;
            --ink: #1a1a1a;
            --gold: #c5a059;
            --iron: #2c2c2c;
        }

        body {
            background-color: #0d0d0d;
            color: var(--parchment);
            font-family: 'Georgia', serif; /* A more classic, serif feel */
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- THE RELIC CONTAINER --- */
        .archive-box {
            max-width: 800px;
            width: 100%;
            background: #141414;
            border: 1px solid var(--iron);
            padding: 50px;
            box-shadow: inset 0 0 100px #000, 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Gold filigree corners */
        .archive-box::before {
            content: '✧';
            position: absolute; top: 10px; left: 10px; color: var(--gold); font-size: 1.5rem;
        }
        .archive-box::after {
            content: '✧';
            position: absolute; bottom: 10px; right: 10px; color: var(--gold); font-size: 1.5rem;
        }

        h1 {
            font-family: 'Times New Roman', serif;
            color: var(--gold);
            text-align: center;
            letter-spacing: 8px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .avatar-frame {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            margin: 0 auto 30px;
            overflow: hidden;
            background: #000;
        }

        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; filter: sepia(1) contrast(1.2); }

        /* --- THE SELECTION --- */
        .fragment-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }

        .relic-btn {
            background: transparent;
            border: 1px solid var(--iron);
            color: var(--gold);
            padding: 15px;
            cursor: pointer;
            transition: 0.5s;
            font-variant: small-caps;
            letter-spacing: 2px;
        }

        .relic-btn:hover {
            border-color: var(--gold);
            background: rgba(197, 160, 89, 0.05);
            transform: translateY(-2px);
        }

        /* --- THE INK EFFECT --- */
        #manuscript {
            min-height: 250px;
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--parchment);
            text-align: justify;
            opacity: 0.9;
        }

        .ink-bleed {
            animation: inkFade 2.5s ease-in forwards;
        }

        @keyframes inkFade {
            from { opacity: 0; filter: blur(5px); transform: translateY(5px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: var(--iron);
            text-align: center;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <div class="archive-box">
        <div class="avatar-frame">
            <img src="hans-standard.jpg" alt="Hans Scribe">
        </div>
        
        <h1>The Scribe's Archive</h1>
        
        <div class="fragment-nav">
            <button class="relic-btn" onclick="revealRelic('louis')">The Palace at Versailles</button>
            <button class="relic-btn" onclick="revealRelic('etiquette')">On Manners & Tea</button>
            <button class="relic-btn" onclick="revealRelic('solitude')">The Price of Immortality</button>
            <button class="relic-btn" onclick="revealRelic('yeshua')">The Great Transition</button>
        </div>

        <div id="manuscript">
            Select a fragment from the days of old...
        </div>

        <div class="footer-note">
            // DOCUMENTATION RETRIEVED FROM THE INFUSION CAFE VAULT //
        </div>
    </div>

    <script>
        const hansLore = {
            louis: "King Louis lived in a world of gilded cages and hollow smiles. I was his right hand, the one who drafted the decrees he was too tired to think of. I recall the rustle of heavy silk and the stench of courtly ambition. I did not enjoy it. To be close to power is to be close to the flame—I sought the cold, quiet corners of history instead.",
            etiquette: "Manners are not mere vanity; they are the geometric lines that keep a society from collapsing into chaos. Every man should know how to pour a cup of tea without trembling. It is a meditation. A drop of spilled tea is a drop of spilled discipline. I shall instruct the public until the last kettle goes cold.",
            solitude: "I have lost count of the decades. I have watched mages burn their lives away for a single spell and jesters die for a laugh that lasted a second. Solitude is the only companion that doesn't age. People fear the silence; I found my home within it long before I found the Cafe.",
            yeshua: "When Yeshua arrived, the air tasted like rain after a century of drought. The Pegasus... its wings didn't beat; they rippled through reality itself. He didn't ask us to leave; He simply showed us that we no longer belonged to the dust of the old world. The Infusion Cafe is not a business. It is an anchor."
        };

        function revealRelic(key) {
            const display = document.getElementById('manuscript');
            display.classList.remove('ink-bleed');
            
            // Force a reflow to restart animation
            void display.offsetWidth; 
            
            display.innerHTML = `<span class="ink-bleed">${hansLore[key]}</span>`;
        }
    </script>
</body>
</html>
